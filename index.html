// ---- Mes prières et écrits (journal) ----
let myWritings = [];
let storageReady = false;

async function persistWritings(){
  try{
    if(window.storage){
      await window.storage.set('mes-ecrits', JSON.stringify(myWritings), false);
    }
  }catch(err){ console.error("Erreur de sauvegarde :", err); }
}

async function loadWritingsFromStorage(){
  try{
    if(window.storage){
      const res = await window.storage.get('mes-ecrits', false);
      if(res && res.value) myWritings = JSON.parse(res.value);
    }
  }catch(err){ /* pas encore de données enregistrées, ou stockage indisponible */ }
  storageReady = true;
}

window.saveWriting = async function(){
  const type = document.getElementById("ecrit-type").value;
  const title = document.getElementById("ecrit-title").value.trim();
  const content = document.getElementById("ecrit-content").value.trim();
  if(!content) return;
  myWritings.unshift({ id:"w"+Date.now(), type, title, content, date:new Date().toISOString() });
  await persistWritings();
  renderMain();
};

  const reader = new FileReader();
  reader.onload = async () => {
    try{
      const imported = JSON.parse(reader.result);
      if(Array.isArray(imported)){

  event.target.value = "";
};

function stopCurrentLoop(){
  if(currentLoopPlayer){ currentLoopPlayer.stop(); currentLoopPlayer.dispose(); currentLoopPlayer = null; }
  currentLoopKey = null;
  document.querySelectorAll(".playlist-row").forEach(b => b.classList.remove("playing"));
}

window.toggleLoop = async function(key){
  if(typeof Tone === "undefined") return;
  await Tone.start();
  if(currentLoopKey === key){ stopCurrentLoop(); return; }
  stopCurrentLoop();
  currentLoopKey = key;
  const btn = document.querySelector(`.playlist-row[data-key="${key}"]`);
  if(btn) btn.classList.add("playing");

  if(key === "piano"){
    const synth = new Tone.PolySynth(Tone.Synth).toDestination();
    const notes = ["C4","E4","G4","C5","G4","E4"];
    let i = 0;
    currentLoopPlayer = new Tone.Loop(time => { synth.triggerAttackRelease(notes[i % notes.length], "8n", time); i++; }, "2n").start(0);
  } else if(key === "lofi"){
    const kick = new Tone.MembraneSynth().toDestination();
    const hat = new Tone.NoiseSynth({volume:-18}).toDestination();
    let step = 0;
    currentLoopPlayer = new Tone.Loop(time => {
      if(step % 4 === 0) kick.triggerAttackRelease("C2","8n",time);
      if(step % 2 === 1) hat.triggerAttackRelease("16n", time);
      step++;
    }, "8n").start(0);
  } else if(key === "ambient"){
    const pad = new Tone.PolySynth(Tone.AMSynth).toDestination();
    pad.set({volume:-8});
    currentLoopPlayer = new Tone.Loop(time => { pad.triggerAttackRelease(["C3","G3","D4"], "1n", time); }, "1n").start(0);
  } else if(key === "basse"){
    const bass = new Tone.MonoSynth().toDestination();
    const notes = ["C2","C2","G2","A2"];
    let i = 0;
    currentLoopPlayer = new Tone.Loop(time => { bass.triggerAttackRelease(notes[i % notes.length], "4n", time); i++; }, "4n").start(0);
  } else if(key === "tamtam"){
    const low = new Tone.MembraneSynth({octaves:3, pitchDecay:0.02}).toDestination();
    const high = new Tone.MembraneSynth({octaves:1.5, pitchDecay:0.01, volume:-6}).toDestination();
    const pattern = [1,0,2,1,0,2,1,0,2,0,1,0];
    let step = 0;
    currentLoopPlayer = new Tone.Loop(time => {
      const v = pattern[step % pattern.length];
      if(v === 1) low.triggerAttackRelease("A1", "16n", time);
      if(v === 2) high.triggerAttackRelease("D2", "16n", time);
      step++;
    }, "8n").start(0);
  } else if(key === "chorale"){
    const choir = new Tone.PolySynth(Tone.FMSynth).toDestination();
    choir.set({volume:-6});
    const chords = [["C4","E4","G4"], ["A3","C4","E4"], ["F3","A3","C4"], ["G3","B3","D4"]];
    let i = 0;
    currentLoopPlayer = new Tone.Loop(time => { choir.triggerAttackRelease(chords[i % chords.length], "1n", time); i++; }, "1n").start(0);
  } else if(key === "acapella"){
    const drone = new Tone.Synth({volume:-14, oscillator:{type:"sine"}}).toDestination();
    currentLoopPlayer = new Tone.Loop(time => { drone.triggerAttackRelease("C4", "2n", time); }, "1n").start(0);
  } else if(key === "rap"){
    const kick = new Tone.MembraneSynth().toDestination();
    const snare = new Tone.NoiseSynth({volume:-8, envelope:{decay:0.2}}).toDestination();
    const hat = new Tone.NoiseSynth({volume:-20, envelope:{decay:0.05}}).toDestination();
    const pattern = ["k","h","h","s","h","k","h","s"];
    let step = 0;
    currentLoopPlayer = new Tone.Loop(time => {
      const v = pattern[step % pattern.length];
      if(v === "k") kick.triggerAttackRelease("C2","8n",time);
      if(v === "s") snare.triggerAttackRelease("16n", time);
      if(v === "h") hat.triggerAttackRelease("32n", time);
      step++;
    }, "8n").start(0);
  } else if(key === "drill"){
    const kick = new Tone.MembraneSynth().toDestination();
    const hat = new Tone.NoiseSynth({volume:-16, envelope:{decay:0.03}}).toDestination();
    const bass = new Tone.MonoSynth({portamento:0.08, volume:-4}).toDestination();
    const bassNotes = ["C1","C1","D#1","F1"];
    let step = 0, bassStep = 0;
    currentLoopPlayer = new Tone.Loop(time => {
      if(step % 8 === 0){ kick.triggerAttackRelease("C1","16n",time); bass.triggerAttackRelease(bassNotes[bassStep % bassNotes.length], "8n", time); bassStep++; }
      hat.triggerAttackRelease("32n", time);
      step++;
    }, "16n").start(0);
  } else if(key === "sabar"){
    const tama = new Tone.MembraneSynth({octaves:2, volume:-4}).toDestination();
    const clap = new Tone.NoiseSynth({volume:-10, envelope:{decay:0.08}}).toDestination();
    const pattern = ["t","","c","t","t","","c",""];
    let step = 0;
    currentLoopPlayer = new Tone.Loop(time => {
      const v = pattern[step % pattern.length];
      if(v === "t") tama.triggerAttackRelease("G2", "16n", time);
      if(v === "c") clap.triggerAttackRelease("16n", time);
      step++;
    }, "16n").start(0);
  }
  Tone.Transport.start();
};

function setRecordStatus(msg, isError){
  const el = document.getElementById("record-status");

window.testMic = async function(){
  setRecordStatus("Test en cours...", false);

  if(!window.isSecureContext){
    setRecordStatus("⚠️ Ce n'est pas un contexte sécurisé (pas de https:// ni localhost). La plupart des navigateurs bloquent le micro ici, quoi qu'il arrive. Utilise « Importer un fichier audio » à la place.", true);
    return;
  }
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    setRecordStatus("⚠️ Ton navigateur n'expose pas l'API micro dans ce contexte. Utilise « Importer un fichier audio » à la place.", true);
    return;
  }
  try{
    if(navigator.permissions && navigator.permissions.query){
      try{
        const status = await navigator.permissions.query({name:"microphone"});
        if(status.state === "denied"){
          setRecordStatus("⚠️ Le micro est explicitement refusé pour cette page (vérifie les réglages de site de ton navigateur). Utilise « Importer un fichier audio » en attendant.", true);
          return;
        }
      }catch(e){ /* certains navigateurs ne supportent pas la requête 'microphone', on continue quand même */ }
    }
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    stream.getTracks().forEach(t => t.stop());
    setRecordStatus("✅ Le micro fonctionne ici ! Tu peux cliquer sur le bouton rouge pour enregistrer.", false);
  }catch(err){
    if(err.name === "NotAllowedError") setRecordStatus("⚠️ Accès refusé (par toi ou par la page qui héberge cet aperçu). Essaie « Importer un fichier audio », ou ouvre le fichier téléchargé directement dans ton navigateur.", true);
    else if(err.name === "NotFoundError") setRecordStatus("⚠️ Aucun micro détecté sur cet appareil.", true);
    else setRecordStatus("⚠️ Erreur : " + err.message, true);
  }
};

window.toggleRecording = async function(){
  if(isRecording){
    if(mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
    clearInterval(recordTimerInterval);
    isRecording = false;
    const btn = document.getElementById("record-btn");
    if(btn){ btn.classList.remove("recording"); btn.textContent = "🔴"; }
    return;
  }

  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    setRecordStatus("L'enregistrement micro n'est pas disponible ici : ton navigateur exige une connexion sécurisée (https:// ou localhost). Un simple fichier ouvert en double-clic (file://) ne suffit souvent pas. Utilise plutôt « Importer un fichier audio » ci-dessous avec l'appli dictaphone de ton téléphone ou ordinateur.", true);
    return;
  }

  try{
    setRecordStatus("Demande d'accès au micro...", false);
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = async () => {
      const blob = new Blob(recordedChunks, {type:"audio/webm"});
      if(blob.size === 0){
        setRecordStatus("Rien n'a été enregistré (fichier vide). Réessaie, ou utilise l'import de fichier.", true);
        return;
      }
      const reader = new FileReader();
      reader.onload = async () => {
        myRecordings.unshift({ id:"r"+Date.now(), date:new Date().toISOString(), base64:reader.result });
        await persistRecordings();
        setRecordStatus("Enregistrement ajouté ci-dessous.", false);
        renderMain();
      };
      reader.readAsDataURL(blob);
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    isRecording = true;
    recordSeconds = 0;
    document.getElementById("record-timer").textContent = "0:00";
    const btn = document.getElementById("record-btn");
    if(btn){ btn.classList.add("recording"); btn.textContent = "⏹️"; }
    setRecordStatus("Enregistrement en cours... clique à nouveau pour arrêter.", false);
    recordTimerInterval = setInterval(() => {
      recordSeconds++;
      const m = Math.floor(recordSeconds/60), s = recordSeconds%60;
      const el = document.getElementById("record-timer");
      if(el) el.textContent = `${m}:${s<10?"0":""}${s}`;
    }, 1000);
  }catch(err){
    if(err.name === "NotAllowedError" || err.name === "SecurityError"){
      setRecordStatus("Accès au micro refusé ou bloqué (souvent le cas dans un aperçu intégré à Claude). Télécharge le fichier et ouvre-le directement dans ton navigateur, ou utilise « Importer un fichier audio » ci-dessous.", true);
    } else if(err.name === "NotFoundError"){
      setRecordStatus("Aucun micro détecté sur cet appareil.", true);
    } else {
      setRecordStatus("Erreur d'enregistrement : " + err.message + ". Essaie « Importer un fichier audio » ci-dessous à la place.", true);
    }
  }
};

async function callSiteAgent(userText){
  const systemContext = "Tu es l'agent de maintenance et d'accueil de cette application appelée Carnet biblique. Elle contient des rubriques sur les psaumes, l'histoire biblique, la création, les prophètes, les saints, les prières, un calendrier liturgique, un studio vocal, et un carnet personnel. Ton rôle : aider la personne à s'y retrouver, répondre à ses questions sur le fonctionnement du site, et rester bref, chaleureux et concret. Tu n'es pas un théologien officiel : pour des questions doctrinales complexes, invite la personne à consulter un prêtre ou une source fiable.";
  const history = agentMessages.map(m => ({role: m.role, content: m.text}));
  const response = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model:"claude-sonnet-4-6",
      max_tokens:500,
      system: systemContext,
      messages:[...history, {role:"user", content:userText}]
    })
  });
  if(!response.ok) throw new Error("HTTP " + response.status);
  const data = await response.json();
  const textBlocks = (data.content || []).filter(b => b.type === "text").map(b => b.text);
  return textBlocks.join("\n") || "(réponse vide)";
}

function routeQuery(text){
  const q = text.toLowerCase();
  for(const route of QUERY_ROUTES){
    if(route.keywords.some(k => q.includes(k))) return route;
  }
  return null;
}

function setQueryStatus(msg, isError){
  const el = document.getElementById("query-status");
  if(el){ el.textContent = msg; el.style.color = isError ? "#B04A3A" : "var(--ink-text-soft)"; }
}

window.askQuestionAloud = function(){
  if(!("speechSynthesis" in window)){
    setQueryStatus("La lecture audio n'est pas prise en charge par ce navigateur.", true);
    return;
  }
  speechSynthesis.cancel();
  const utter = new SpeechSynthesisUtterance("Comment te sens-tu aujourd'hui, ou que cherches-tu ? Dis-le-moi, ou écris-le ci-dessous.");
  utter.lang = "fr-FR";
  utter.rate = 0.95;
  speechSynthesis.speak(utter);
};

window.startVoiceQuery = function(){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){
    setQueryStatus("La reconnaissance vocale n'est pas prise en charge par ce navigateur (essaie Chrome ou Edge). Écris ta réponse à la place.", true);
    return;
  }
  try{
    const recognition = new SR();
    recognition.lang = "fr-FR";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    setQueryStatus("🎙️ Je t'écoute...", false);
    recognition.onresult = (e) => {
      const transcript = e.results[0][0].transcript;
      const input = document.getElementById("query-input");
      if(input) input.value = transcript;
      setQueryStatus(`J'ai entendu : « ${transcript} »`, false);
      window.submitQuery();
    };
    recognition.onerror = (e) => {
      setQueryStatus("Erreur de reconnaissance vocale (" + e.error + "). Essaie d'écrire ta réponse, ou vérifie l'autorisation du micro.", true);
    };
    recognition.onspeechend = () => recognition.stop();
    recognition.start();
  }catch(err){
    setQueryStatus("Impossible de démarrer la reconnaissance vocale : " + err.message, true);
  }
};

window.submitQuery = function(){
  const input = document.getElementById("query-input");
  const text = input ? input.value.trim() : "";
  if(!text){ setQueryStatus("Dis-moi d'abord ce que tu ressens ou ce que tu cherches.", true); return; }
  const route = routeQuery(text);
  if(route){
    const label = MODES[route.mode].label;
    setQueryStatus(`Je t'amène vers « ${label} »...`, false);
    setTimeout(() => gotoMode(route.mode, route.section || ""), 700);
  } else {
    setQueryStatus("Je n'ai pas trouvé de correspondance précise avec ces mots. Essaie plus simple : peur, seul, pardon, roi, création, ange... ou explore l'étagère.", true);
  }
};

    if(today >= advent && today < xmasEve) return "Nous sommes dans le Temps de l'Avent.";
    if(today >= xmasEve && today < christmasSeasonEnd) return "Nous sommes dans le Temps de Noël.";
    if(today >= christmasSeasonEnd && today < ashWed) return "Nous sommes dans le Temps ordinaire.";
    if(today >= ashWed && today < holyThu) return "Nous sommes en Carême.";
    if(today >= holyThu && today <= easterSun) return "Nous sommes dans le Triduum pascal.";
    if(today > easterSun && today <= pentecost) return "Nous sommes dans le Temps pascal.";
    if(today > pentecost && today < nextAdvent) return "Nous sommes dans le Temps ordinaire.";
  }
  return "";
}

if(section.diagram === "royaumes"){
    main.innerHTML = `
      <div class="theme-header">
        <div class="dropcap">${SECTION_ICONS[section.id] || ROMAN[idx]}</div>
        <div class="theme-heading">
          <h2>${section.title}</h2>
          <p>${section.desc}</p>
        </div>
      </div>
      <hr class="flourish">
      <div style="padding:0.5rem 0;overflow-x:auto;">${buildRoyaumesSVG()}</div>
      <p style="text-align:center;color:var(--paper-text-dim);font-size:0.85rem;font-style:italic;margin-top:0.5rem;">Le royaume du Nord tombe 136 ans avant celui du Sud : deux histoires parallèles, deux issues différentes.</p>
    `;
    return;
  }

  if(section.diagram === "cycle"){
    main.innerHTML = `
      <div class="theme-header">
        <div class="dropcap">${SECTION_ICONS[section.id] || ROMAN[idx]}</div>
        <div class="theme-heading">
          <h2>${section.title}</h2>
          <p>${section.desc}</p>
        </div>
      </div>
      <hr class="flourish">
      <div style="padding:0.5rem 0;">${buildCycleSVG()}</div>
      <p style="text-align:center;color:var(--paper-text-dim);font-size:0.85rem;font-style:italic;margin-top:0.5rem;">Ce schéma se répète tout au long du livre des Juges, à chaque nouvelle génération qui oublie les leçons de la précédente.</p>
    `;
    return;
  }

  const items = isPsaumes ? section.psalms : section.entries;

  if(openEntry && openEntry.sectionId === section.id){
    const item = items[openEntry.idx];
    main.innerHTML = isPsaumes
      ? psalmDetailPage(item, section.title, section.id, openEntry.idx, items.length)
      : historyDetailPage(item, section.title, section.id, openEntry.idx, items.length);
    return;
  }

  main.innerHTML = `
    <div class="section-frame">
      <div class="theme-header">
        <div class="dropcap">${SECTION_ICONS[section.id] || ROMAN[idx]}</div>
        <div class="theme-heading">
          <h2>${section.title}</h2>
          <p>${section.desc}</p>
        </div>
      </div>
      ${section.id === "temps-liturgiques" ? `<p class="psalm-theme-tag" style="display:inline-block; margin:0.5rem 0 1rem;">📍 ${computeLiturgicalSeasonBanner()}</p>` : ""}
      <hr class="flourish">
      <div class="psalm-grid">
        ${items.map((item,i) => isPsaumes ? psalmCard(item, section.title, section.id, i) : historyCard(item, section.title, section.id, i)).join("")}
      </div>
    </div>
  `;
}

document.getElementById("search").addEventListener("input", (e) => {
  searchQuery = e.target.value;
  openEntry = null;
  renderIndex();
  renderMain();
});

renderTabs();
applyModeText();
renderIndex();
loadWritingsFromStorage().then(() => { if(mode === "ecrits") renderMain(); });
loadRecordingsFromStorage().then(() => { if(mode === "studio") renderMain(); });
const initialHash = window.location.hash.replace("#", "");
if(initialHash && MODES[initialHash]){
  applyRoute(initialHash);
} else {
  renderMain();
}
</script>
</body>
</html>
